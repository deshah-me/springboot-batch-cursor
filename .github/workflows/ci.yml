name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/ci.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: read
  security-events: write
  packages: read

jobs:
  # ==================== LINTING & VALIDATION ====================
  validate:
    runs-on: ubuntu-latest
    name: Validation & Linting
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js for commitlint
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install commitlint
        run: |
          npm install --save-dev @commitlint/config-conventional @commitlint/cli

      - name: Validate conventional commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha || 'origin/main' }} --to HEAD
        continue-on-error: true

      - name: Code style check (Google Java Format)
        run: |
          echo "Running code style validation..."
        continue-on-error: true

  # ==================== SECURITY ANALYSIS (CodeQL) ====================
  codeql:
    name: Security Analysis
    needs: validate
    uses: ./.github/workflows/codeql.yml
    permissions:
      actions: read
      contents: read
      security-events: write
      packages: read

  # ==================== BUILD PHASE ====================
  build:
    runs-on: ubuntu-latest
    needs: codeql
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: mydb
        ports:
          - 3306:3306
        options: '--health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ppassword" --health-interval=10s --health-timeout=5s --health-retries=5'

    env:
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/mydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver
      SPRING_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/dists
          key: gradle-cache-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties','**/build.gradle','**/settings.gradle') }}
          restore-keys: |
            gradle-cache-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Wait for MySQL to be ready
        run: |
          sudo apt-get update
          sudo apt-get install -y default-mysql-client
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -ppassword >/dev/null 2>&1 && echo 'MySQL ready' && break
            echo 'Waiting for MySQL...'
            sleep 2
          done

      - name: Compile Java services
        run: ./gradlew --no-daemon compileJava
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx1024m"

      - name: Build application
        run: ./gradlew --no-daemon --stacktrace clean build -x test
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx1024m"

  # ==================== TESTING PHASE ====================
  test:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: mydb
        ports:
          - 3306:3306
        options: '--health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ppassword" --health-interval=10s --health-timeout=5s --health-retries=5'

    env:
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/mydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver
      SPRING_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/dists
          key: gradle-cache-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties','**/build.gradle','**/settings.gradle') }}
          restore-keys: |
            gradle-cache-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Wait for MySQL to be ready
        run: |
          sudo apt-get update
          sudo apt-get install -y default-mysql-client
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -ppassword >/dev/null 2>&1 && echo 'MySQL ready' && break
            echo 'Waiting for MySQL...'
            sleep 2
          done

      - name: Run unit tests
        run: ./gradlew --no-daemon test
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx1024m"

      - name: Generate code coverage report
        run: ./gradlew --no-daemon jacocoTestReport
        continue-on-error: true
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx1024m"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: build/test-results/test/*.xml
        continue-on-error: true